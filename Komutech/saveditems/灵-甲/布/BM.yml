item:
  ==: org.bukkit.inventory.ItemStack
  v: 3955
  type: LEATHER_HELMET
  meta:
    ==: ItemMeta
    meta-type: COLORABLE_ARMOR
    color:
      ==: Color
      ALPHA: 255
      RED: 249
      BLUE: 254
      GREEN: 255
    enchants:
      PROTECTION_ENVIRONMENTAL: 1
      DURABILITY: 3
    Unbreakable: false
    attribute-modifiers:
      # 最大生命值属性
      GENERIC_MAX_HEALTH:
      # 基础生命值增加（加法运算）
      - ==: org.bukkit.attribute.AttributeModifier
        amount: 1.0  # 增加1颗心（2点生命值）
        name: generic.maxHealth  # 属性名称
        slot: HEAD  # 生效槽位：头部
        uuid: 00004869-0000-0000-a001-a001a0000000  # 唯一标识符
        operation: 0  # 操作类型：0=加法（直接增加值）
      # 百分比生命值增加（乘法运算）
      - ==: org.bukkit.attribute.AttributeModifier
        amount: 0.01  # 增加1%（0.01倍）
        name: generic.maxHealth
        slot: HEAD
        uuid: 00004869-0000-0000-a001-a001a0100000
        operation: 1  # 操作类型：1=乘法（基于基础值的百分比）
      # 护甲值属性
      GENERIC_ARMOR:
      - ==: org.bukkit.attribute.AttributeModifier
        amount: 1.0  # 增加1点护甲值（每点护甲减少4%伤害）
        name: generic.armor
        slot: HEAD
        uuid: 00004869-0000-0000-a001-a001b0000000
        operation: 0  # 加法运算
      # 护甲韧性属性
      GENERIC_ARMOR_TOUGHNESS:
      - ==: org.bukkit.attribute.AttributeModifier
        amount: 1.0  # 增加1点护甲韧性（减少高伤害攻击的穿透效果）
        name: generic.armorToughness
        slot: HEAD
        uuid: 00004869-0000-0000-a001-a001b0200000
        operation: 0  # 加法运算
      # 击退抗性属性
      GENERIC_KNOCKBACK_RESISTANCE:
      - ==: org.bukkit.attribute.AttributeModifier
        amount: 0.1  # 增加10%击退抗性（1.0=完全免疫）
        name: generic.knockbackResistance
        slot: HEAD
        uuid: 00004869-0000-0000-a001-a001c0000000
        operation: 0  # 加法运算

